<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--accent:#58a6ff;--accent2:#3fb950;--text:#e6edf3;--muted:#6e7681;--user-bg:#1f3a5f;--bot-bg:#1a2332}
    body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;background-image:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(88,166,255,0.06) 0%,transparent 60%)}
    header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-shrink:0}
    .logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem}
    .header-info h1{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
    .header-info p{font-size:.68rem;color:var(--muted)}
    .status{width:8px;height:8px;border-radius:50%;background:var(--accent2);margin-left:auto;box-shadow:0 0 8px rgba(63,185,80,.5)}

    .api-bar{padding:.8rem 1.5rem;border-bottom:1px solid var(--border);display:flex;gap:.6rem;flex-shrink:0}
    .api-bar input{flex:1;font-family:'DM Mono',monospace;font-size:.75rem;padding:.5rem .9rem;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);outline:none}
    .api-bar input:focus{border-color:var(--accent)}
    .api-bar input::placeholder{color:var(--muted)}
    .btn-clear{font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;padding:.5rem .9rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
    .btn-clear:hover{color:var(--text);border-color:var(--muted)}

    .chat-area{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
    .chat-area::-webkit-scrollbar{width:4px}
    .chat-area::-webkit-scrollbar-track{background:transparent}
    .chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

    .msg{display:flex;gap:.8rem;animation:fadeUp .3s ease both;max-width:85%}
    .msg.user{align-self:flex-end;flex-direction:row-reverse}
    .msg.bot{align-self:flex-start}
    .avatar{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
    .msg.user .avatar{background:linear-gradient(135deg,#3d6b9e,#5a8fd4);color:#fff}
    .msg.bot .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
    .bubble{padding:.8rem 1rem;border-radius:12px;font-size:.8rem;line-height:1.7}
    .msg.user .bubble{background:var(--user-bg);border:1px solid rgba(88,166,255,.2);border-top-right-radius:2px}
    .msg.bot .bubble{background:var(--bot-bg);border:1px solid var(--border);border-top-left-radius:2px;white-space:pre-wrap}
    .typing{display:flex;align-items:center;gap:4px;padding:.4rem 0}
    .typing span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}

    .welcome{text-align:center;padding:3rem 1rem;color:var(--muted)}
    .welcome-icon{font-size:2.5rem;margin-bottom:1rem}
    .welcome h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:.5rem}
    .welcome p{font-size:.78rem;line-height:1.7}
    .suggestions{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-top:1.2rem}
    .suggestion{font-size:.72rem;padding:.4rem .9rem;border:1px solid var(--border);border-radius:2rem;background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s}
    .suggestion:hover{border-color:var(--accent);color:var(--accent)}

    .input-area{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:.7rem;flex-shrink:0}
    .msg-input{flex:1;font-family:'DM Mono',monospace;font-size:.82rem;padding:.75rem 1rem;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s;resize:none;height:46px}
    .msg-input:focus{border-color:var(--accent)}
    .msg-input::placeholder{color:var(--muted)}
    .btn-send{font-family:'Syne',sans-serif;font-weight:700;font-size:.82rem;padding:.75rem 1.4rem;border-radius:10px;border:none;background:var(--accent);color:#0d1117;cursor:pointer;transition:all .2s;white-space:nowrap}
    .btn-send:hover:not(:disabled){background:#79bbff;transform:translateY(-1px)}
    .btn-send:disabled{opacity:.4;cursor:not-allowed}
    .footer{text-align:center;color:var(--muted);font-size:.65rem;padding:.5rem;flex-shrink:0;letter-spacing:.05em}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes bounce{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
  <header>
    <div class="logo">✦</div>
    <div class="header-info">
      <h1>AI Chatbot</h1>
      <p>Powered by Claude API</p>
    </div>
    <div class="status"></div>
  </header>

  <div class="api-bar">
    <input type="password" id="apiKey" placeholder="Enter Claude API key (sk-ant-...)"/>
    <button class="btn-clear" onclick="clearChat()">Clear Chat</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">✦</div>
      <h2>Hello! How can I help?</h2>
      <p>Enter your API key above and start chatting.<br/>Ask me anything!</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">Explain AI in simple terms</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Write a short poem</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Give me study tips</div>
        <div class="suggestion" onclick="sendSuggestion(this)">What is machine learning?</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <input class="msg-input" id="msgInput" type="text" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()"/>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()">Send</button>
  </div>
  <div class="footer">Built with HTML + JS + Claude API | Project by Priyanka</div>

<script>
  let history = [];

  function sendSuggestion(el) {
    document.getElementById('msgInput').value = el.textContent;
    sendMessage();
  }

  async function sendMessage() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const input = document.getElementById('msgInput');
    const msg = input.value.trim();
    if (!apiKey) { alert('Please enter your Claude API key.'); return; }
    if (!msg) return;

    document.getElementById('welcome')?.remove();
    input.value = '';

    appendMsg('user', msg);
    history.push({ role: 'user', content: msg });

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    const typingId = appendTyping();

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: 'You are a helpful, friendly AI assistant. Keep responses concise and clear.',
          messages: history
        })
      });
      const data = await res.json();
      removeTyping(typingId);
      if (!res.ok) throw new Error(data.error?.message || 'API error');
      const reply = data.content[0].text;
      history.push({ role: 'assistant', content: reply });
      appendMsg('bot', reply);
    } catch(err) {
      removeTyping(typingId);
      appendMsg('bot', 'Error: ' + err.message);
    }
    btn.disabled = false;
    input.focus();
  }

  function appendMsg(role, text) {
    const area = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `<div class="avatar">${role === 'user' ? 'U' : 'AI'}</div><div class="bubble">${escHtml(text)}</div>`;
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
  }

  function appendTyping() {
    const area = document.getElementById('chatArea');
    const id = 'typing-' + Date.now();
    const div = document.createElement('div');
    div.className = 'msg bot'; div.id = id;
    div.innerHTML = '<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    area.appendChild(div);
    area.scrollTop = area.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    document.getElementById(id)?.remove();
  }

  function clearChat() {
    history = [];
    const area = document.getElementById('chatArea');
    area.innerHTML = '<div class="welcome" id="welcome"><div class="welcome-icon">✦</div><h2>Hello! How can I help?</h2><p>Enter your API key above and start chatting.<br/>Ask me anything!</p><div class="suggestions"><div class="suggestion" onclick="sendSuggestion(this)">Explain AI in simple terms</div><div class="suggestion" onclick="sendSuggestion(this)">Write a short poem</div><div class="suggestion" onclick="sendSuggestion(this)">Give me study tips</div><div class="suggestion" onclick="sendSuggestion(this)">What is machine learning?</div></div></div>';
  }

  function escHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br/>');
  }
</script>
</body>
</html>
